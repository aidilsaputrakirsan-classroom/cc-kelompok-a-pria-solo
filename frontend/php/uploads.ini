; Production upload limits for advance-review (many PDFs per request).
; post_max_size must exceed largest single multipart chunk (~30MB+ batches).
upload_max_filesize = 64M
post_max_size = 128M
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
max_file_uploads = 25

; Avoid PHP warnings prepended to JSON API responses
display_errors = Off
log_errors = On
