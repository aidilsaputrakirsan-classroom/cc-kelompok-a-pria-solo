# Production overrides — Modul 14 (Tugas DevOps)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# Or: make prod

services:
  db:
    ports: []

  document-service:
    ports: []
    environment:
      LOG_LEVEL: INFO

  frontend:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_LEVEL: info

  gateway:
    ports:
      - "8080:80"
