# API Gateway — PRIA Solo (Modul 12)
# Auth: OpenAdmin (Laravel session) — tidak ada /auth/* terpisah
# /api/python/* → FastAPI document-service :8001

upstream web_service {
    server frontend:8000;
}

upstream document_service {
    server document-service:8001;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 100M;

    location /api/python/ {
        proxy_pass http://document_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /health {
        default_type application/json;
        return 200 '{"status":"healthy","service":"gateway"}';
    }

    location / {
        proxy_pass http://web_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
