# API Gateway — PRIA Solo (Modul 12–13)
# Auth: OpenAdmin (Laravel session) — tidak ada /auth/* terpisah
# /api/python/* → FastAPI document-service :8001
# Modul 13 bonus: rate limiting on document API

limit_req_zone $binary_remote_addr zone=api_python_limit:10m rate=20r/s;

upstream web_service {
    server frontend:8000;
}

upstream document_service {
    server document-service:8001;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 100M;

    location /api/python/ {
        limit_req zone=api_python_limit burst=40 nodelay;
        proxy_pass http://document_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /frontend/health {
        proxy_pass http://web_service/health;
        proxy_set_header Host $host;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    location /frontend/metrics {
        proxy_pass http://web_service/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    location /status {
        proxy_pass http://web_service/status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        default_type application/json;
        return 200 '{"status":"healthy","service":"gateway"}';
    }

    location / {
        proxy_pass http://web_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }
}
