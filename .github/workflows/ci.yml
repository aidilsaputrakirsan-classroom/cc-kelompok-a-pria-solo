# CI Pipeline — automated lint, tests, and Docker image builds (Modul 10 — Bagian C).
# Triggers: push to main, pull_request to main.

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check backend/

  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./backend

    env:
      CHUNK_SIZE: "10"
      OPENAI_API_KEY: "test-dummy-key-for-ci"
      AZURE_DI_PROJESSAI_KEY: "dummy-key"
      AZURE_DI_PROJESSAI_ENDPOINT: "https://example.cognitiveservices.azure.com/"
      AZURE_OCR_PROJESSAI_KEY: "dummy-key"
      AZURE_OCR_PROJESSAI_ENDPOINT: "https://example.cognitiveservices.azure.com/"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing

  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, json, bcmath, gd, pdo_sqlite
          coverage: none

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views
          mkdir -p storage/logs bootstrap/cache
          chmod -R 775 storage bootstrap/cache || true

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Generate app key
        run: php artisan key:generate --ansi

      - name: Run tests
        run: php artisan test

  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cloudapp-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t cloudapp-frontend:ci ./frontend

      - name: Build success
        run: |
          echo "All Docker images built successfully."
          docker images | grep cloudapp || true

  # ================================
  # Modul 11 — CD: Railway + health + deployment summary
  # ================================
  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-backend, test-frontend, build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect Railway token
        id: railway
        run: |
          if [ -n "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "RAILWAY_TOKEN tidak di-set — melewati deploy Railway (CI tetap hijau)."
          fi

      - name: Install Railway CLI
        if: steps.railway.outputs.ready == 'true'
        run: npm install -g @railway/cli

      - name: Deploy backend
        if: steps.railway.outputs.ready == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          cd backend
          railway up --service backend --detach

      - name: Deploy frontend
        if: steps.railway.outputs.ready == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          cd frontend
          railway up --service frontend --detach

      - name: Tunggu rollout Railway
        if: steps.railway.outputs.ready == 'true'
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 30

      - name: Health check (production)
        env:
          BACKEND_BASE: ${{ secrets.BACKEND_PRODUCTION_URL }}
        run: |
          if [ -z "${BACKEND_BASE:-}" ]; then
            echo "BACKEND_PRODUCTION_URL tidak di-set — melewati GET /health ke cloud."
            echo "Set secret ini (base URL tanpa slash akhir, mis. https://xxx.up.railway.app) untuk mengaktifkan pengecekan."
            exit 0
          fi
          HEALTH_URL="${BACKEND_BASE%/}/health"
          echo "GET $HEALTH_URL"
          HTTP_STATUS=$(curl -sS --max-time 60 -o /tmp/health.json -w "%{http_code}" "$HEALTH_URL" || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Health check passed (HTTP $HTTP_STATUS)"
            cat /tmp/health.json
          else
            echo "Health check FAILED (HTTP $HTTP_STATUS)"
            cat /tmp/health.json 2>/dev/null || true
            echo "Periksa log deploy di Railway."
            exit 1
          fi

      - name: Deployment summary
        env:
          BACKEND_BASE: ${{ secrets.BACKEND_PRODUCTION_URL }}
        run: |
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          {
            echo "## Deployment summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Workflow | ${{ github.workflow }} |"
            echo "| Run | ${{ github.run_id }} |"
            echo "| Ref | \`${{ github.ref }}\` |"
            echo "| SHA | \`${{ github.sha }}\` |"
            echo "| Timestamp (UTC) | $TS |"
            echo "| Railway deploy | ${{ steps.railway.outputs.ready }} |"
            if [ -n "${BACKEND_BASE:-}" ]; then
              echo "| Backend base (secret set) | yes |"
            else
              echo "| Backend base (secret set) | no |"
            fi
            echo ""
            echo "Run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Deployment summary written to GitHub Actions step summary."

  notify-ci-failure:
    name: 💬 CI failure notice
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test-backend, test-frontend, build-docker]
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      (needs.lint.result == 'failure' ||
       needs.test-backend.result == 'failure' ||
       needs.test-frontend.result == 'failure' ||
       needs.build-docker.result == 'failure')

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.pull_request?.number;
            if (!issue_number) return;

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              '### CI Pipeline failed',
              '',
              'One or more jobs failed in **CI Pipeline**. Open the **Checks** tab and inspect the failing job logs.',
              '',
              `[View workflow run](${runUrl})`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });
