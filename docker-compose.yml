# ============================================================
# Docker Compose — PRIA SOLO Microservices (Modul 12)
# Laravel (auth + web + MySQL migrations) + Document API :8001 + Gateway
# ============================================================
# Prasyarat:
#   cp backend/.env.docker.example backend/.env.docker
#   cp frontend/.env.docker.example frontend/.env.docker
#
#   docker compose up --build -d
#   docker compose exec frontend php artisan migrate --force
#
# Akses: http://localhost:8080 (gateway)
# Backend FastAPI langsung: http://localhost:8001
# ============================================================

services:
  db:
    image: mysql:8.0
    container_name: pria-solo-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cloudapp
      MYSQL_USER: clouduser
      MYSQL_PASSWORD: cloudpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  document-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pria-solo-document-service
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      CORS_ORIGINS: "http://localhost:8080,http://localhost:8000"
    ports:
      - "8001:8001"
    networks:
      - cloudnet
    depends_on:
      db:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 45s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pria-solo-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.docker
    environment:
      URL_VM_PYTHON: http://gateway/api/python
      APP_URL: http://localhost:8080
    networks:
      - cloudnet
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  gateway:
    image: nginx:alpine
    container_name: pria-solo-gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - cloudnet
    depends_on:
      document-service:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  mysql_data:
    name: pria-solo-mysql-data

networks:
  cloudnet:
    name: pria-solo-network
    driver: bridge
